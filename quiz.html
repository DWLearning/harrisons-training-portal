<!DOCTYPE html>
<html><head><link rel="stylesheet" href="css/style.css"></head><body>
<a href="index.html"><img src="images/Logo.jpeg" class="logo"></a>
<div class="container">
<h2>Fire Safety Quiz</h2>
<label>Full Name</label><br><input id="name"><br><br>
<div id="quiz"></div>
<button onclick="submitQuiz()">Complete Course</button>

<div id="certificate" style="display:none">
<h2>Certificate of Completion</h2>
<img src="images/Logo.jpeg" style="width:200px"><br><br>
<p>This certifies that</p>
<h2 id="certName"></h2>
<p>has successfully completed</p>
<h3>Fire Safety Training</h3>
<p>Date Completed: <span id="certDate"></span></p>
<button onclick="window.print()">View / Print Certificate</button>
</div>
</div>

<script>
const questions = [["Which piece of legislation covers fire safety responsibilities in most UK workplaces?", ["Regulatory Reform (Fire Safety) Order 2005", "Health and Safety at Work Act", "Food Safety Act", "Licensing Act"], "Regulatory Reform (Fire Safety) Order 2005"], ["What are the three elements of the fire triangle?", ["Heat Fuel Oxygen", "Water Fuel Heat", "Air Smoke Heat", "Fuel Smoke Oxygen"], "Heat Fuel Oxygen"], ["What should you do if you discover a fire?", ["Raise the alarm", "Ignore it", "Hide it", "Wait"], "Raise the alarm"], ["Where should staff go after evacuation?", ["Assembly point", "Office", "Kitchen", "Car park"], "Assembly point"], ["Who is responsible for fire safety in the workplace?", ["Everyone", "Manager only", "Owner only", "Fire service"], "Everyone"], ["What must always be kept clear?", ["Fire exits", "Bar area", "Office desk", "Kitchen sink"], "Fire exits"], ["Which extinguisher is used for electrical fires?", ["CO2", "Water", "Foam", "Wet Chemical"], "CO2"], ["What helps prevent fires in the workplace?", ["Good housekeeping", "Ignoring hazards", "Blocking exits", "Overloading sockets"], "Good housekeeping"], ["What should you never do during a fire?", ["Put yourself at risk", "Raise the alarm", "Evacuate", "Call emergency services"], "Put yourself at risk"], ["Which extinguisher is used for cooking oil fires?", ["Wet Chemical", "Water", "CO2", "Foam"], "Wet Chemical"], ["What document identifies fire hazards in a workplace?", ["Fire Risk Assessment", "Menu", "Inventory", "Cleaning rota"], "Fire Risk Assessment"], ["What should you do with damaged electrical equipment?", ["Report it", "Keep using it", "Ignore it", "Hide it"], "Report it"], ["How often should fire training be refreshed?", ["Regularly", "Never", "Once ever", "Only when asked"], "Regularly"], ["After evacuating a building you should:", ["Stay at the assembly point", "Go home", "Return inside", "Ignore instructions"], "Stay at the assembly point"]];
let displayedQuestions = [];

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function loadQuiz(){
 displayedQuestions = shuffle([...questions]);
 let html="";
 displayedQuestions.forEach((q,i)=>{
   let answers = shuffle([...q[1]]);
   html += `<p><b>${i+1}. ${q[0]}</b></p>`;
   answers.forEach(ans=>{
      html += `<label><input type="radio" name="q${i}" value="${ans}"> ${ans}</label><br>`;
   });
 });
 document.getElementById("quiz").innerHTML = html;
}

function submitQuiz(){
 let name=document.getElementById("name").value;
 if(!name){ alert("Enter full name"); return; }

 let score=0;
 displayedQuestions.forEach((q,i)=>{
   let selected=document.querySelector('input[name="q'+i+'"]:checked');
   if(selected && selected.value === q[2]) score++;
 });

 if(score < 12){
   alert("You scored "+score+" / 14\nPass mark is 80% (12 correct).\nPlease review the training and try again.");
   return;
 }

 let date=new Date().toLocaleDateString();
 let records=JSON.parse(localStorage.getItem("records") || "[]");
 let idx = records.findIndex(r => r.name===name && r.course==="Fire Safety");
 if(idx>=0){ records[idx].date=date; }
 else { records.push({name:name,course:"Fire Safety",date:date}); }
 localStorage.setItem("records", JSON.stringify(records));

 document.getElementById("quiz").style.display="none";
 document.getElementById("certificate").style.display="block";
 document.getElementById("certName").innerText=name;
 document.getElementById("certDate").innerText=date;
}

loadQuiz();
</script></body></html>
